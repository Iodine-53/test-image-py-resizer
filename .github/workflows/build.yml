name: Build Multi-Platform App

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pillow pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --onefile app.py

      - name: Upload Windows Executable
        uses: actions/upload-artifact@v4
        with:
          name: Windows_App
          path: dist/app.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pillow pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --onefile --windowed app.py

      - name: Zip Mac App
        run: |
          cd dist
          zip -r app_mac.zip app.app

      - name: Upload Mac Executable
        uses: actions/upload-artifact@v4
        with:
          name: Mac_App
          path: dist/app_mac.zip
